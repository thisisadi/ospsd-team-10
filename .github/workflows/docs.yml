name: Deploy documentation

# Publishes MkDocs output to the gh-pages branch.
#
# Required once per repo (or you get 404 at *.github.io/<repo>/):
#   Settings → Pages → Source: "Deploy from a branch" → Branch: gh-pages, folder: / (root)
# Do NOT leave Source on "GitHub Actions" unless you use deploy-pages instead of this action.

on:
  push:
    branches:
      - main
      - hw-2
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Build MkDocs site
        run: uv run mkdocs build

      - name: Push site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
